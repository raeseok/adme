# AdMe Supabase local development configuration
# https://supabase.com/docs/guides/cli/config

project_id = "adme"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://web-ashen-xi-52.vercel.app"
additional_redirect_urls = [
  "http://127.0.0.1:3000",
  "https://127.0.0.1:3000",
  "https://web-ashen-xi-52.vercel.app/auth/callback",
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
